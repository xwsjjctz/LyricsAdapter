name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            build_cmd: npm run electron:build:mac -- --publish never
            artifact: mac
          - os: windows-latest
            build_cmd: npm run electron:build:win -- --publish never
            artifact: win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # macOS 构建：已移除 Apple 签名 & 公证，走全量下载更新。
      # Windows 构建：NSIS 安装包，差量更新不签名也可用。
      - name: Build & package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: ${{ matrix.build_cmd }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/latest.yml
            release/latest-mac.yml

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-mac
          path: release/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-win
          path: release/

      - name: List release files
        run: ls -la release/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # 清理该 tag 下所有残留的 release / draft（含无 v 前缀的重复 draft）
          for r in $(gh release list --limit 50 | awk -v t="$TAG" '$3==t {print $1}'); do
            echo "Deleting existing release: $r"
            gh release delete "$r" --yes --cleanup-tag=false || true
          done
          # 构建存在的 release artifacts 列表
          shopt -s nullglob
          FILES=(release/*.dmg release/*.zip release/*.exe)
          # 始终包含更新元数据（如果存在）
          for f in release/latest.yml release/latest-mac.yml; do
            [ -f "$f" ] && FILES+=("$f")
          done
          echo "Uploading: ${FILES[*]}"
          # 创建新的 release（v0.* 自动标记为 Pre-release）
          if [[ "$TAG" == v0.* ]]; then PRE="--prerelease"; else PRE=""; fi
          gh release create "$TAG" "${FILES[@]}" \
            --title "$TAG" \
            --generate-notes \
            $PRE
