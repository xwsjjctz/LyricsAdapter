name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            build_cmd: npm run electron:build:mac -- --publish never
            artifact: mac
          - os: windows-latest
            build_cmd: npm run electron:build:win -- --publish never
            artifact: win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # macOS 代码签名 + 公证：electron-builder 原生读取 CSC_LINK / CSC_KEY_PASSWORD
      # 以及 APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID，自动签名、notarize、staple。
      # Windows 暂不签名（NSIS 差量更新不签名也可用，SmartScreen 警告为可接受代价）。
      - name: Build & package (macOS)
        if: runner.os == 'macOS'
        env:
          CSC_LINK: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ${{ matrix.build_cmd }}

      - name: Build & package (Windows)
        if: runner.os == 'Windows'
        run: ${{ matrix.build_cmd }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact }}
          path: |
            release/*.dmg
            release/*.dmg.blockmap
            release/*.zip
            release/*.zip.blockmap
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
            release/latest-mac.yml

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-mac
          path: release/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-win
          path: release/

      - name: List release files
        run: ls -la release/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # 清理该 tag 下所有残留的 release / draft（含无 v 前缀的重复 draft）
          for r in $(gh release list --limit 50 | awk -v t="$TAG" '$3==t {print $1}'); do
            echo "Deleting existing release: $r"
            gh release delete "$r" --yes --cleanup-tag=false || true
          done
          # 创建新的 release（v0.* 自动标记为 Pre-release）
          if [[ "$TAG" == v0.* ]]; then PRE="--prerelease"; else PRE=""; fi
          gh release create "$TAG" \
            release/*.dmg release/*.dmg.blockmap \
            release/*.zip release/*.zip.blockmap \
            release/*.exe release/*.exe.blockmap \
            release/latest.yml release/latest-mac.yml \
            --title "$TAG" \
            --generate-notes \
            $PRE
