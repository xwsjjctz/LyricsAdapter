name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            build_cmd: npm run electron:build:mac
            artifact: dmg
          - os: windows-latest
            build_cmd: npm run electron:build:win
            artifact: exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & package
        run: ${{ matrix.build_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact }}
          path: |
            release/*.dmg
            release/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dmg
          path: release/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-exe
          path: release/

      - name: List release files
        run: ls -la release/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # 清理该 tag 下所有残留的 release / draft（含无 v 前缀的重复 draft）
          for r in $(gh release list --limit 50 | awk -v t="$TAG" '$3==t {print $1}'); do
            echo "Deleting existing release: $r"
            gh release delete "$r" --yes --cleanup-tag=false || true
          done
          # 创建新的 release（v0.* 自动标记为 Pre-release）
          if [[ "$TAG" == v0.* ]]; then PRE="--prerelease"; else PRE=""; fi
          gh release create "$TAG" release/*.dmg release/*.exe \
            --title "$TAG" \
            --generate-notes \
            $PRE
